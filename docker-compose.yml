version: "3.9"

networks:
  app-net:
    driver: bridge

services:

  api-gateway:
    build: ./services/api-gateway
    ports:
      - "8000:8000"
    environment:
      FRONTEND_URL: http://frontend:3000
      HELLO_SVC_URL: http://hello-service:5000
    depends_on:
      - frontend
      - hello-service
    networks:
      - app-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build: ./services/frontend
    expose:
      - "3000"
    networks:
      - app-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  hello-service:
    build: ./services/hello-service
    expose:
      - "5000"
    environment:
      SERVICE_VERSION: "1.0.0"
    networks:
      - app-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
